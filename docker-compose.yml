# Banking Agent — local stack.
# M0: Postgres + Jaeger (infra only).
# M2: agent service added (Python, port 8000). Gateway + MCP server run on the host.
services:
  postgres:
    image: postgres:16   # plain Postgres — RAG vectors live in FAISS (Python tier), not here
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bank}
      POSTGRES_DB: ${POSTGRES_DB:-bank}
    ports:
      - "5432:5432"
    # init scripts run alphabetically on first boot → 01_schema, 02_seed, 03_lockdown
    volumes:
      - ./db:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bank} -d ${POSTGRES_DB:-bank}"]
      interval: 3s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

